; Omnibot drive — Raspberry Pi Pico (RP2040)
; micro-ROS Jazzy over USB Serial
; earlephilhower Arduino core

[env:pico]
platform              = https://github.com/maxgerhardt/platform-raspberrypi.git
board                 = pico
board_build.core      = earlephilhower
framework             = arduino

; micro-ROS platformio library — pulls prebuilt Jazzy libs for RP2040
lib_deps              = https://github.com/micro-ROS/micro_ros_platformio

; ROS2 distribution and transport
board_microros_distro     = jazzy
board_microros_transport  = serial

monitor_speed         = 115200
monitor_flags         = --echo

; Extra flags needed for micro-ROS + earlephilhower
build_flags =
    -DPICO_FLASH_SIZE_BYTES=2097152
    -Wl,--allow-multiple-definition

; lib_archive must be false for micro-ROS to link correctly
lib_archive           = false

; meta information for micro-ROS build system
board_microros_user_meta = project_colcon.meta